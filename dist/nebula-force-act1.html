<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEBULA FORCE — Act 1</title>
<meta name="theme-color" content="#060714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nebula Force">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ═══ NEBULA FORCE — style.css: Shining-Force-blue windows, one-screen mobile layout.
   #ui-battle and #ui-town swap via body.mode-* classes; the canvas is scaled
   by fitLayout() in js/battle.js so everything always fits without scrolling. ═══ */
:root{
  --win-top:#3448b8; --win-bot:#16206e;
  --edge:#f0f0f4; --ink:#08081a;
  --ally:#7ce8ff; --enemy:#ff7088; --accent:#ffd23a;
  --special:#b47ae8;
  --text:#e8ecff; --dim:#9aa6d8;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
button{-webkit-user-select:none; user-select:none;}
html,body{height:100%; overscroll-behavior:none;}
body{
  position:fixed; inset:0; width:100%;
  touch-action:none;
  background:#060714;
  background-image:
    radial-gradient(1px 1px at 12% 22%, #ffffff55 50%, transparent 51%),
    radial-gradient(1px 1px at 78% 8%, #ffffff44 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 55% 70%, #9fd8ff33 50%, transparent 51%);
  color:var(--text);
  font-family:'IBM Plex Mono', monospace;
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden;
  padding:5px;
  user-select:none; -webkit-user-select:none;
}
#app{display:flex; flex-direction:column; gap:6px; align-items:center; width:100%; height:100%;}
header{
  display:flex; justify-content:space-between; align-items:baseline;
  width:100%; padding:1px 2px; flex:0 0 auto;
}
header h1{
  font-family:'Press Start 2P', monospace;
  font-size:10px; color:var(--accent);
  text-shadow:1px 1px 0 #000, 0 0 10px #ffd23a55;
}
header .sub{font-size:9px; color:var(--dim);}
#stage{position:relative; flex:0 0 auto;}
canvas#view{
  display:block; width:100%; height:auto;
  image-rendering:pixelated;
  border:3px solid var(--edge);
  outline:2px solid var(--ink);
  border-radius:6px;
  background:#04050c;
  touch-action:none;
}
#fastbtn{
  position:absolute; top:6px; right:6px; z-index:15;
  font-family:'Press Start 2P', monospace; font-size:7px;
  background:#101a5ecc; color:var(--dim);
  border:1px solid #c8d4ff66; border-radius:4px;
  padding:5px 7px; cursor:pointer;
}
#fastbtn.on{background:#8a6a10dd; color:#fff; border-color:var(--accent);}
body.mode-town #fastbtn, body.mode-space #fastbtn, body.mode-entity #fastbtn, body.mode-return #fastbtn{display:none;}
.sfwin{
  background:linear-gradient(180deg, var(--win-top), var(--win-bot));
  border:3px solid var(--edge); outline:2px solid var(--ink);
  border-radius:8px;
  box-shadow:4px 4px 0 #00000088;
}
#dialog{
  position:absolute; left:3%; right:3%; bottom:4%;
  padding:9px 12px 12px;
  display:none; min-height:74px; z-index:20;
}
#dialog.show{display:block;}
#dialog .who{
  font-family:'Press Start 2P', monospace; font-size:9px;
  color:var(--accent); text-shadow:1px 1px 0 #000; margin-bottom:6px;
}
#dialog .txt{font-size:12px; line-height:1.55; min-height:38px; text-shadow:1px 1px 0 #000;}
#dialog .more{
  position:absolute; right:12px; bottom:6px;
  color:var(--accent); font-size:11px;
  animation:blink 0.7s steps(1) infinite;
}
#dialog .choices{display:none; gap:8px; margin-top:8px;}
#dialog .choices.show{display:flex;}
.dlgbtn{
  font-family:'Press Start 2P', monospace; font-size:8px;
  background:linear-gradient(180deg,#2438a0,#101a5e);
  color:var(--text);
  border:2px solid var(--edge); outline:1px solid var(--ink);
  border-radius:5px; padding:8px 10px; cursor:pointer;
  text-shadow:1px 1px 0 #000;
}
.dlgbtn:hover{color:var(--accent);}
@keyframes blink{50%{opacity:0;}}
#shop, #items{
  position:absolute; left:6%; right:6%; top:5%;
  padding:10px 12px;
  display:none; z-index:20;
  max-height:88%;
  overflow-y:auto;
  touch-action:pan-y;
}
#shop.show, #items.show{display:block;}
#shop h3, #items h3{
  font-family:'Press Start 2P', monospace; font-size:9px;
  color:var(--accent); text-shadow:1px 1px 0 #000; margin-bottom:8px;
  display:flex; justify-content:space-between;
}
.shopitem{
  display:flex; justify-content:space-between; align-items:center;
  width:100%; text-align:left;
  font-family:'IBM Plex Mono', monospace; font-size:12px;
  background:transparent; border:none; outline:none;
  color:var(--text); padding:6px 7px; border-radius:4px;
  cursor:pointer; text-shadow:1px 1px 0 #000;
}
.shopitem:hover, .shopitem:focus{background:#ffffff22; color:var(--accent);}
.shopitem:disabled{opacity:.5;}
.shopitem .pr{color:var(--accent);}
.shopitem.exit{margin-top:5px; border-top:1px dashed #c8d4ff55; padding-top:9px;}
.shopitem small{display:block; color:var(--dim); font-size:10px;}
#overlay{
  position:absolute; inset:0; display:none;
  align-items:center; justify-content:center; flex-direction:column; gap:16px;
  background:#03040add; z-index:50; backdrop-filter:blur(2px); border-radius:6px;
  text-align:center; padding:14px;
}
#overlay.show{display:flex;}
#overlay h2{
  font-family:'Press Start 2P', monospace; font-size:15px;
  color:var(--accent); text-shadow:2px 2px 0 #000, 0 0 18px #ffd23a88;
  line-height:1.7;
}
#overlay h2.lose{color:var(--enemy); text-shadow:2px 2px 0 #000, 0 0 18px #ff547088;}
#overlay p{color:var(--dim); font-size:11px; max-width:400px; line-height:1.6;}
#overlay button{
  font-family:'Press Start 2P', monospace; font-size:9px;
  background:linear-gradient(180deg,#2438a0,#101a5e);
  color:var(--text); border:2px solid var(--edge); outline:1px solid var(--ink);
  border-radius:5px; padding:10px 12px; cursor:pointer;
}
/* ── one-screen UI stacks (mode-switched) ── */
#ui{display:flex; flex-direction:column; gap:5px; flex:0 0 auto; width:100%;}
body.mode-town #ui-battle{display:none;}
body.mode-battle #ui-town{display:none;}
body.mode-space #ui-battle, body.mode-space #ui-town{display:none;}
body.mode-entity #ui-battle, body.mode-entity #ui-town{display:none;}
body.mode-return #ui-battle, body.mode-return #ui-town{display:none;}
#ui-battle{display:flex; flex-direction:column; gap:5px;}
.panel{
  background:linear-gradient(180deg, var(--win-top), var(--win-bot));
  border:2px solid var(--edge);
  outline:1px solid var(--ink);
  border-radius:7px;
  padding:6px 8px;
  box-shadow:inset 0 0 0 1px #00000055, 3px 3px 0 #00000066;
}
#cmdpanel{padding:5px 7px;}
#actions{
  display:flex; gap:6px; align-items:center;
  height:42px; overflow-x:auto; overflow-y:hidden;
  touch-action:pan-x;
  scrollbar-width:none;
}
#actions::-webkit-scrollbar{display:none;}
#actions button{
  font-family:'Press Start 2P', monospace;
  font-size:8px; flex:0 0 auto;
  background:linear-gradient(180deg,#2438a0,#101a5e);
  color:var(--text);
  border:2px solid var(--edge);
  outline:1px solid var(--ink);
  border-radius:5px; padding:9px 10px;
  cursor:pointer; letter-spacing:1px;
  text-shadow:1px 1px 0 #000;
  white-space:nowrap;
}
#actions button:disabled{opacity:.4; cursor:default;}
#actions button.special{background:linear-gradient(180deg,#6a3aa8,#40206a); border-color:#e0c8ff;}
#hint{
  font-size:10px; color:#c8d4ff; height:15px; line-height:15px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:3px; text-shadow:1px 1px 0 #000;
}
/* compact unit strip */
#card{height:104px; overflow:hidden;}
#card .crow{display:flex; gap:8px; align-items:flex-start;}
#card .portrait{
  background:#0d1440; border:2px solid var(--edge); outline:1px solid var(--ink);
  border-radius:5px; width:48px; height:48px; flex:0 0 auto;
  display:flex; align-items:flex-end; justify-content:center; overflow:hidden;
}
#card .portrait canvas{image-rendering:pixelated;}
#card .mid{flex:1; min-width:0;}
#card .name{
  font-family:'Press Start 2P', monospace; font-size:9px;
  text-shadow:1px 1px 0 #000; margin-bottom:3px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#card .name .lv{color:var(--accent); font-size:8px;}
.bar{height:7px; background:#08102e; border:1px solid #c8d4ff88; border-radius:3px; overflow:hidden; margin:1px 0 3px;}
.bar > i{display:block; height:100%; transition:width .3s;}
.bar.hp > i{background:linear-gradient(90deg,#37d67a,#a8e84e);}
.bar.mp > i{background:linear-gradient(90deg,#3f7fd6,#7ce8ff);}
.bar.xp{height:4px;}
.bar.xp > i{background:linear-gradient(90deg,#c8a020,#ffd23a);}
.barlabel{font-size:8px; color:#c8d4ff; display:flex; justify-content:space-between; line-height:1.2;}
#card .stats{
  flex:0 0 auto; font-size:9px; line-height:1.6; text-align:right;
  color:var(--text); text-shadow:1px 1px 0 #000;
}
#card .stats b{color:var(--accent); font-weight:600;}
#card .proc{
  font-size:9px; color:var(--accent); border-top:1px dashed #c8d4ff55;
  margin-top:4px; padding-top:3px; line-height:1.5;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-shadow:1px 1px 0 #000;
}
#card .proc .sp{color:var(--special);}
#card .proc .used{color:var(--dim); text-decoration:line-through;}
#card .proc .rg{color:#48e060;}
/* mini log */
#log{
  height:52px; overflow-y:auto; font-size:9.5px; line-height:1.5;
  touch-action:pan-y;
}
#log p{margin-bottom:1px;}
#log .a{color:var(--ally);} #log .e{color:var(--enemy);}
#log .p{color:var(--accent);} #log .d{color:var(--dim);}
#log .s{color:var(--special);}
#log .ev{color:#48e0d0;}
#log .round{color:#c8d4ff; border-top:1px dashed #c8d4ff55; margin-top:3px; padding-top:2px; font-size:8.5px; letter-spacing:1px;}
/* ── town controls ── */
#ui-town{
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 6px 0;
}
#dpad{display:grid; grid-template-columns:repeat(3,46px); grid-template-rows:repeat(3,46px); gap:4px;}
.pbtn{
  background:linear-gradient(180deg,#2438a0,#101a5e);
  border:2px solid var(--edge); outline:1px solid var(--ink);
  border-radius:8px; color:var(--text);
  font-size:16px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; touch-action:none;
}
.pbtn:active{background:#3a52d8;}
.pbtn.blank{visibility:hidden;}
#midtown{display:flex; flex-direction:column; gap:8px; align-items:center;}
#items-btn{
  font-family:'Press Start 2P', monospace; font-size:8px;
  background:linear-gradient(180deg,#2438a0,#101a5e);
  color:var(--text);
  border:2px solid var(--edge); outline:1px solid var(--ink);
  border-radius:6px; padding:11px 9px; cursor:pointer; touch-action:none;
}
#town-hint{font-size:9px; color:var(--dim); text-align:center; max-width:110px;}
#abtn{
  width:64px; height:64px; border-radius:50%;
  background:linear-gradient(180deg,#c8a020,#8a6a10);
  border:3px solid var(--edge); outline:2px solid var(--ink);
  font-family:'Press Start 2P', monospace; font-size:13px; color:#fff;
  text-shadow:1px 1px 0 #000; cursor:pointer; touch-action:none;
}
#abtn:active{background:#e8c040;}

</style>
</head>

let animPhase=0;
function drawSprite(ctx2,name,footX,footY,scale,flip,bob,alpha){
  const rows=SPRITES[name]; if(!rows) return;
  const rw=rows[0].length;
  const ox=footX-(rw/2)*scale;
  const oy=footY-rows.length*scale+(bob||0);
  if(alpha!==undefined) ctx2.globalAlpha=alpha;
  for(let y=0;y<rows.length;y++){
    const r=rows[y];
    for(let x=0;x<rw;x++){
      const ch=r[x];
      if(!ch||ch==='.'||ch===' ') continue;
      let col=PAL[ch];
      if(ANIM[ch]) col=ANIM[ch][animPhase];
      if(!col) continue;
      const dx=flip?(rw-1-x):x;
      ctx2.fillStyle=col;
      ctx2.fillRect(ox+dx*scale, oy+y*scale, scale, scale);
    }
  }
  if(alpha!==undefined) ctx2.globalAlpha=1;
}
const silCache={};
function silhouette(name,color,scale){
  const key=name+'|'+color+'|'+scale;
  if(silCache[key]) return silCache[key];
  const rows=SPRITES[name];
  const rw=rows[0].length;
  const c=document.createElement('canvas');
  c.width=rw*scale; c.height=rows.length*scale;
  const g2=c.getContext('2d');
  for(let y=0;y<rows.length;y++)for(let x=0;x<rw;x++){
    const ch=rows[y][x];
    if(!ch||ch==='.'||ch===' ') continue;
    g2.fillStyle=color;
    g2.fillRect(x*scale,y*scale,scale,scale);
  }
  silCache[key]=c;
  return c;
}
function drawSilhouette(ctx2,name,footX,footY,scale,flip,bob,color,alpha){
  const rows=SPRITES[name];
  const rw=rows[0].length;
  const sil=silhouette(name,color,scale);
  const ox=footX-(rw/2)*scale;
  const oy=footY-rows.length*scale+(bob||0);
  ctx2.save();
  if(alpha!==undefined) ctx2.globalAlpha=alpha;
  if(flip){
    ctx2.translate(ox+rw*scale/2,0);
    ctx2.scale(-1,1);
    ctx2.drawImage(sil,-rw*scale/2,oy);
  } else { ctx2.drawImage(sil,ox,oy); }
  ctx2.restore();
}
function drawGlowOutline(ctx2,name,footX,footY,scale,flip,bob,color,alpha){
  ctx2.save();
  ctx2.globalAlpha=alpha;
  ctx2.globalCompositeOperation='lighter';
  const o=Math.max(2,scale-1);
  for(const [dx,dy] of [[-o,0],[o,0],[0,-o],[0,o],[-o,-o],[o,-o],[-o,o],[o,o]]){
    drawSilhouette(ctx2,name,footX+dx,footY+dy,scale,flip,bob,color,alpha);
  }
  ctx2.restore();
  ctx2.globalAlpha=1;
}
function spritePixels(name,scale){
  const rows=SPRITES[name]; const out=[];
  const rw=rows[0].length;
  for(let y=0;y<rows.length;y++)for(let x=0;x<rw;x++){
    const ch=rows[y][x];
    if(!ch||ch==='.'||ch===' ') continue;
    out.push({x:x*scale,y:y*scale,col:PAL[ch]||'#888'});
  }
  return out;
}
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function ease(p){return 1-Math.pow(1-p,3);}
async function tween(ms,fn){
  const t0=performance.now();
  for(;;){
    const p=Math.min(1,(performance.now()-t0)/ms);
    fn(p);
    if(p>=1) return;
    await wait(16);
  }
}
function roundRect(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y); g.lineTo(x+w-r,y); g.arcTo(x+w,y,x+w,y+r,r);
  g.lineTo(x+w,y+h-r); g.arcTo(x+w,y+h,x+w-r,y+h,r);
  g.lineTo(x+r,y+h); g.arcTo(x,y+h,x,y+h-r,r);
  g.lineTo(x,y+r); g.arcTo(x,y,x+r,y,r);
  g.closePath();
}
function wrapText(g,text,x,y,maxW,lh){
  const words=text.split(' ');
  let line='', yy=y;
  for(const w of words){
    const test=line? line+' '+w : w;
    if(g.measureText(test).width>maxW){
      g.fillText(line,x,yy); yy+=lh; line=w;
    } else line=test;
  }
  g.fillText(line,x,yy);
}

/* pixel-cell painters used by all tile generators (16×16 cells, PXS px each) */
const PXS=3;

function rr(g2,x,y,w,h,c){g2.fillStyle=c; g2.fillRect(x*PXS,y*PXS,w*PXS,h*PXS);}

/* ═══ NEBULA FORCE — ui.js: shared dialog window (with choices) + hint ═══ */
const dlg=document.getElementById('dialog');
const dlgWho=dlg.querySelector('.who');
const dlgTxt=dlg.querySelector('.txt');
const dlgMore=dlg.querySelector('.more');
const dlgChoices=dlg.querySelector('.choices');
let dlgLines=[], dlgIdx=0, typing=false, typeTimer=null, afterDialog=null;
let dlgActive=false;
function openDialog(name, lines, after){
  dlgActive=true;
  if(mode==='town') tstate='dialog';
  dlgLines=lines; dlgIdx=0; afterDialog=after||null;
  dlgWho.textContent=name;
  dlgChoices.classList.remove('show'); dlgChoices.innerHTML='';
  dlg.classList.add('show');
  typeLine();
}
function typeLine(){
  const full=dlgLines[dlgIdx];
  typing=true; dlgMore.style.display='none';
  dlgTxt.textContent='';
  let i=0;
  clearInterval(typeTimer);
  typeTimer=setInterval(()=>{
    i++;
    dlgTxt.textContent=full.slice(0,i);
    if(i>=full.length){
      clearInterval(typeTimer);
      typing=false;
      dlgMore.style.display='block';
    }
  },16);
}
function advanceDialog(){
  if(dlgChoices.classList.contains('show')) return;
  if(typing){
    clearInterval(typeTimer);
    dlgTxt.textContent=dlgLines[dlgIdx];
    typing=false; dlgMore.style.display='block';
    return;
  }
  dlgIdx++;
  if(dlgIdx<dlgLines.length){ typeLine(); }
  else{
    dlg.classList.remove('show');
    const cb=afterDialog; afterDialog=null;
    dlgActive=false;
    if(mode==='town') tstate='walk';
    if(cb) cb();
  }
}
function openChoice(name, prompt, options){
  dlgActive=true;
  if(mode==='town') tstate='dialog';
  dlgWho.textContent=name;
  dlgTxt.textContent=prompt;
  dlgMore.style.display='none';
  dlgLines=[prompt]; dlgIdx=0; typing=false; afterDialog=null;
  dlgChoices.innerHTML='';
  for(const o of options){
    const b=document.createElement('button');
    b.className='dlgbtn'; b.textContent=o.label;
    b.onclick=()=>{
      dlgChoices.classList.remove('show'); dlgChoices.innerHTML='';
      dlg.classList.remove('show');
      dlgActive=false;
      if(mode==='town') tstate='walk';
      o.cb&&o.cb();
    };
    dlgChoices.appendChild(b);
  }
  dlgChoices.classList.add('show');
  dlg.classList.add('show');
}
function setHint(t){ const h=document.getElementById('hint'); if(h) h.textContent=t; }

</script>

let cut=null;
const PAD_CENTER={x:6,y:19};
function startLaunch(){
  tstate='cutscene';
  cut={phase:'fly-in', t:0, ship:{x:0,y:0}, dust:[], path:null};
}
function bfsPath(sx,sy,tx2,ty2){
  const M=MAPS[curMap];
  const prev={}; const q=[[sx,sy]]; const seen=new Set([sx+','+sy]);
  while(q.length){
    const [x,y]=q.shift();
    if(x===tx2&&y===ty2){
      const path=[]; let k=x+','+y;
      while(prev[k]){ const [px2,py2]=k.split(',').map(Number); path.unshift([px2,py2]); k=prev[k]; }
      return path;
    }
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx, ny=y+dy;
      const kk=nx+','+ny;
      if(seen.has(kk)) continue;
      if(nx<0||ny<0||nx>=M.w||ny>=M.h) continue;
      if(!WALK.has(M.grid[ny][nx])) continue;
      if(npcs.some(n2=>n2.map===curMap&&n2.x===nx&&n2.y===ny)) continue;
      seen.add(kk); prev[kk]=x+','+y; q.push([nx,ny]);
    }
  }
  return [];
}
function updateLaunch(dt){
  const padPx=PAD_CENTER.x*TS+TS/2, padPy=PAD_CENTER.y*TS+TS/2;
  cut.t+=dt;
  if(cut.phase==='fly-in'){
    const T1=2100;
    const p=Math.min(1,cut.t/T1);
    const e=ease(p);
    cut.ship.x = padPx + (1-e)*620;
    cut.ship.y = padPy - 6 - (1-e)*380;
    if(p>=1){
      cut.phase='dust'; cut.t=0;
      for(let i=0;i<10;i++) cut.dust.push({a:Math.random()*6.28, r:6+Math.random()*8, sp:.05+Math.random()*.08, life:0});
    }
  } else if(cut.phase==='dust'){
    if(cut.t>500){
      cut.phase='walk'; cut.t=0;
      cut.path=bfsPath(hero.x,hero.y,PAD_CENTER.x,PAD_CENTER.y+1);
    }
  } else if(cut.phase==='walk'){
    if(!hero.moving){
      if(cut.path&&cut.path.length){
        const [nx,ny]=cut.path.shift();
        hero.dir = nx>hero.x?'right':nx<hero.x?'left':ny>hero.y?'down':'up';
        hero.moving=true; hero.mx=nx-hero.x; hero.my=ny-hero.y; hero.prog=0;
      } else {
        cut.phase='board'; cut.t=0; hero.dir='up';
      }
    }
  } else if(cut.phase==='board'){
    if(cut.t>700){ hero.hidden=true; cut.phase='hold'; cut.t=0; }
  } else if(cut.phase==='hold'){
    if(cut.t>500){ cut.phase='lift'; cut.t=0; }
  } else if(cut.phase==='lift'){
    const T2=1900;
    const p=Math.min(1,cut.t/T2);
    const e=p*p;
    cut.ship.x = padPx + e*760;
    cut.ship.y = padPy - 6 - e*460 - Math.sin(p*3)*6;
    if(p>=1){ cut.phase='fadeout'; cut.t=0; }
  } else if(cut.phase==='fadeout'){
    if(cut.t>700){ cut.phase='done'; startSpace(); }
  }
}

  if(ch==='t'){ openDialog('—',["Two bowls, pre-set. One of them has a place card. It says 'GUEST'. It has said that for forty years."]); return; }
  if(ch==='L'){ openDialog('—',["A plaza lamp. Moths from three different planets orbit it."]); return; }
  if(ch==='K'&&(hero.dir==='up'||hero.dir==='down')){ openDialog('—',["A sheer crater wall. You'd need the stairs."]); return; }
  if(curMap==='town'&&(ch==='P'||tileAt(hero.x,hero.y)==='P')){ talkRiga(); return; }
}
/* town movement */
const held={};
function tryMove(dir){
  if(hero.moving||tstate!=='walk'||mode!=='town') return;
  hero.dir=dir;
  const [dx,dy]=DIRV[dir];
  const nx=hero.x+dx, ny=hero.y+dy;
  const ch=tileAt(nx,ny);
  if(curMap==='town'&&ch==='d'){
    if(hero.x===SHOP_DOOR.x&&hero.y===SHOP_DOOR.y) enterShop(); else enterHouse();
    return;
  }
  if(!WALK.has(ch)) return;
  if(npcs.some(n2=>n2.map===curMap&&n2.x===nx&&n2.y===ny)) return;
  hero.moving=true; hero.mx=dx; hero.my=dy; hero.prog=0;
}
function updateHero(dt){
  if(hero.moving){
    const speed = (tileAt(hero.x,hero.y)==='/'||tileAt(hero.x+hero.mx,hero.y+hero.my)==='/') ? 240 : 170;
    hero.prog+=dt/speed;
    if(hero.prog>=1){
      hero.x+=hero.mx; hero.y+=hero.my;
      hero.moving=false; hero.prog=0;
      if(curMap==='worm'&&tileAt(hero.x,hero.y)==='x'){ exitHouse(); }
      else if(curMap==='shopint'&&tileAt(hero.x,hero.y)==='x'){ exitShop(); }
      if(curMap==='temple'&&hero.x===3&&hero.y===2&&!entityFired){ entityFired=true; startEntity(); }
    }
  }
  if(!hero.moving && tstate==='walk'){
    if(held.up) tryMove('up');
    else if(held.down) tryMove('down');
    else if(held.left) tryMove('left');
    else if(held.right) tryMove('right');
  }
  hero.px=(hero.x+(hero.moving?hero.mx*hero.prog:0))*TS;
  hero.py=(hero.y+(hero.moving?hero.my*hero.prog:0))*TS;
}
let npcTimer=0;
function updateNPCs(dt){
  npcTimer-=dt;
  if(npcTimer<=0){
    npcTimer=900+Math.random()*900;
    if(tstate!=='walk') return;
    for(const n2 of npcs){
      if(n2.map!==curMap||!n2.wander||Math.random()<.5) continue;
      const dirs=['up','down','left','right'];
      const d=dirs[(Math.random()*4)|0];
      const [dx,dy]=DIRV[d];
      const nx=n2.x+dx, ny=n2.y+dy;
      if(Math.abs(nx-n2.home[0])>2||Math.abs(ny-n2.home[1])>2) continue;
      const ch=tileAt(nx,ny);
      if(!WALK.has(ch)||ch==='/') continue;
      if(nx===hero.x&&ny===hero.y) continue;
      if(npcs.some(o=>o!==n2&&o.map===curMap&&o.x===nx&&o.y===ny)) continue;
      n2.x=nx; n2.y=ny; n2.dir=d;
    }
  }
}
/* town render — 10×8 tile window on the shared canvas */
const VW=10, VH=8;
let tCamX=0, tCamY=0, tCamInit=false;
function heroSprite(){
  if(hero.dir==='up') return ['dax_up',false];
  if(hero.dir==='down') return ['dax_down',false];
  return ['dax_side', hero.dir==='left'];
}
function windowMode(x,y){ return (x*31+y*17)%3; }
function drawTown(now,dt){
  if(tstate!=='cutscene'){ updateHero(dt); updateNPCs(dt); }
  else { updateHero(dt); updateLaunch(dt); }
  const M=MAPS[curMap];
  let fx2=hero.px+TS/2, fy2=hero.py+TS/2;

    fx2=PAD_CENTER.x*TS+TS/2+60; fy2=PAD_CENTER.y*TS+TS/2-40;
  }
  let tx2=Math.max(0,Math.min(Math.max(0,M.w*TS-VW*TS), fx2-VW*TS/2));
  let ty2=Math.max(0,Math.min(Math.max(0,M.h*TS-VH*TS), fy2-VH*TS/2));
  if(!tCamInit){ tCamX=tx2; tCamY=ty2; tCamInit=true; }
  tCamX+=(tx2-tCamX)*.12; tCamY+=(ty2-tCamY)*.12;
  const x0=Math.floor(tCamX/TS), y0=Math.floor(tCamY/TS);
  for(let y=y0;y<=y0+VH;y++){
    for(let x=x0;x<=x0+VW;x++){
      if(x<0||y<0||x>=M.w||y>=M.h) continue;
      const ch=M.grid[y][x];
      const cache=townTiles[ch]||townTiles[curMap==='town'?',':'.'];
      const dx=x*TS-tCamX, dy=y*TS-tCamY;
      cx.drawImage(cache[(x+y)%2], dx, dy);
      if(curMap==='town'&&!'K/|'.includes(ch)){
        const lv=levelOf(y);
        if(lv===0){ cx.fillStyle='rgba(4,6,20,.22)'; cx.fillRect(dx,dy,TS,TS); }
        else if(lv===2){ cx.fillStyle='rgba(255,214,140,.05)'; cx.fillRect(dx,dy,TS,TS); }
      }
      if(ch==='W'){
        const md=windowMode(x,y);
        if(md===0){

          cx.fillRect(dx+4*PXS, dy+5*PXS, 3*PXS, 6*PXS);
        } else if(md===1){

          cx.fillStyle=`rgba(72,180,200,${a})`;
          cx.fillRect(dx+4*PXS, dy+5*PXS, 8*PXS, 6*PXS);
        } else {
          const flick=(Math.sin(now/97+x*7)+Math.sin(now/233+y*13))>1.55;
          cx.fillStyle=flick?'#3ab0c8':'#0e3038';
          cx.fillRect(dx+8*PXS, dy+5*PXS, 4*PXS, 6*PXS);
          cx.fillStyle='#0e3038';
          cx.fillRect(dx+4*PXS, dy+5*PXS, 3*PXS, 6*PXS);
        }
      }
      if(ch==='~'){
        const ph=Math.sin(now/400+x+y);
        cx.fillStyle=`rgba(72,224,208,${.12+.08*ph})`;
        cx.fillRect(dx,dy,TS,TS);
        cx.fillStyle='#48e0d0';
        cx.fillRect(dx+((3+(animPhase?4:0))*PXS), dy+(5*PXS), 2*PXS, PXS);
        cx.fillRect(dx+(9*PXS), dy+((10+(animPhase?1:0))*PXS), 2*PXS, PXS);
      }
      if(ch==='|'){
        if(tileAt(x,y+1)!=='|'){ /* base of the chute: splash & mist */
          for(let i=0;i<3;i++){
            const sx3=(2+((now/70+i*37+x*11)|0)%12)*PXS;
            cx.fillStyle='rgba(230,255,252,.8)';

        }
        const off=((now/90)|0)%8;
        cx.fillStyle='rgba(72,224,208,.55)';
        for(let s2=0;s2<3;s2++){
          const sx2=(3+s2*4)*PXS;

        }
        cx.fillStyle='rgba(200,255,250,.35)';
        cx.fillRect(dx+7*PXS, dy+(((off+5)%8)*2)*PXS, PXS, 3*PXS);
      }
      if(ch==='!'){
        /* the pit HEAVES — one slow spatial pulse, faster if the spore is near */
        const sporeNear=inventory.includes('Dormant Spore');
        const rate=sporeNear?750:1400;
        const heave=Math.sin(now/rate + x*0.9 + y*0.7);
        cx.fillStyle=`rgba(140,255,120,${.07+.09*Math.max(0,heave)})`;
        cx.fillRect(dx,dy,TS,TS);
        cx.fillStyle=`rgba(10,26,8,${.10+.08*Math.max(0,-heave)})`;
        cx.fillRect(dx,dy,TS,TS);
        /* a bubble rises, HESITATES, then pops */
        const cyc=((now/2400)+((x*13+y*7)%8)/8)%1;
        const bx=((x*13+y*7)%12)+2;
        let bY;
        if(cyc<.45) bY=15-cyc/.45*8;          /* rise */

        else if(cyc<.8) bY=7-(cyc-.7)/.1*3;   /* pop upward */
        else bY=null;
        if(bY!==null){
          cx.fillStyle= cyc<.7 ? 'rgba(140,255,140,.75)' : 'rgba(220,255,200,.9)';
          cx.fillRect(dx+bx*PXS, dy+bY*PXS, PXS, PXS);
          if(cyc>=.7) cx.fillRect(dx+(bx-1)*PXS, dy+(bY-1)*PXS, 3*PXS, PXS);
        }
        if(sporeNear && ((now/900)|0)%5===((x+y)%5)){
          cx.fillStyle='rgba(180,255,150,.18)';
          cx.fillRect(dx,dy,TS,TS);

      }
      if(ch==='A'){

        cx.fillRect(dx+7*PXS, dy+2*PXS, 2*PXS, 3*PXS);
        for(let i=0;i<3;i++){

        const ph2=(now/1100)%3;

        cx.fillStyle=c1;
        cx.beginPath(); cx.arc(dx+TS/2, dy+TS*.35, TS*(.8+.15*mix), 0, 7); cx.fill();

        cx.fillStyle=cols[((ph2|0)+1)%3];
        cx.fillRect(dx+7*PXS, dy+(1+((now/160)|0)%5)*PXS, PXS, PXS);
      }
      if(ch==='M'&&animPhase){
        cx.fillStyle='rgba(139,224,78,.5)';
        cx.fillRect(dx+((x*7)%12+2)*PXS, dy+4*PXS, PXS, PXS);
      }
      if(ch==='l'&&animPhase){
        cx.fillStyle='rgba(216,220,232,.55)';
        cx.fillRect(dx+11*PXS, dy+6*PXS, PXS, 3*PXS);
        cx.fillStyle='rgba(58,104,200,.55)';
        cx.fillRect(dx+6*PXS, dy+6*PXS, PXS, 3*PXS);
      }
      if(ch==='^'&&(x*7+y)%3===0&&animPhase){

        cx.fillRect(dx+11*PXS, dy, PXS, PXS);

      if(ch==='u'){
        const bt=((now/120)|0)%6;

        cx.fillRect(dx+(5+((now/200|0)%4))*PXS, dy+2*PXS, PXS, PXS);

        cx.fillRect(dx+(6+(animPhase?1:0))*PXS, dy-(bt)*PXS, 2*PXS, 2*PXS);

        cx.fillRect(dx+3*PXS, dy+9*PXS, 4*PXS, 3*PXS);
      }
      if(ch==='L'){
        const g=.10+.05*Math.sin(now/300);
        cx.fillStyle=`rgba(255,210,58,${g})`;
        cx.beginPath(); cx.arc(dx+TS/2, dy+TS/2, TS*.9, 0, 7); cx.fill();
        cx.fillStyle=animPhase?'#ffd23a':'#ffb347';
        cx.fillRect(dx+6*PXS, dy+2*PXS, 4*PXS, PXS);
      }
      if(ch==='P'&&animPhase){
        cx.fillStyle='#ffd23a';
        cx.fillRect(dx+7*PXS, dy+7*PXS, 2*PXS, 2*PXS);
      }
      if(ch==='d'){
        const g=.15+.10*Math.sin(now/420);
        cx.fillStyle=`rgba(255,179,71,${g})`;
        cx.fillRect(dx+3*PXS, dy+12*PXS, 10*PXS, 4*PXS);
      }
      if(ch==='c'){
        const g=.18+.14*Math.sin(now/430+x*2+y);
        cx.fillStyle=`rgba(72,224,208,${g})`;
        cx.beginPath(); cx.arc(dx+TS/2, dy+TS/2, TS*.7, 0, 7); cx.fill();
      }
      if(ch==='O'){

  }
  /* ═══ worldsmith ambient pass: living edges, ripples, the shape in the goo ═══ */
  if(curMap==='town'){

        if(x>=0&&y>=0&&x<MAPS.town.w&&y<MAPS.town.h&&MAPS.town.grid[y][x]==='~') spots.push([x,y]);

      gooShape={t:0, y:(R2.y0+.5+Math.random()*(R2.y1-R2.y0))*TS, x0:R2.x0*TS, x1:(R2.x1+1)*TS, dir:Math.random()<.5?1:-1};

        cx.fillStyle=`rgba(6,18,6,${a})`;
        cx.beginPath(); cx.ellipse(sx-tCamX, gooShape.y-tCamY+Math.sin(p*9)*3, 20, 7, 0, 0, 7); cx.fill();

    /* chalk hopscotch, drawn where its examine lives */
    {

        cx.strokeStyle='rgba(240,240,244,.35)';
        for(let i2=0;i2<3;i2++) cx.strokeRect(hx+14, hy+8+i2*11, 13, 10);
        cx.strokeRect(hx+29, hy+19, 13, 10);
      }
    }
  }
  if(curMap==='vantorr'){
    /* the broken halo across the sky, glowing over the canyon rim */

    for(let i=0;i<3;i++){
      cx.strokeStyle=ringCols[i];
      cx.globalAlpha=.20+.08*Math.sin(now/900+i*2);
      cx.lineWidth=5-i;
      cx.beginPath();
      cx.arc(cv.width*.5, cv.height*1.9+i*30, cv.height*1.86, Math.PI*1.28, Math.PI*1.72);

    cx.globalAlpha=1; cx.lineWidth=1;
    cx.fillStyle='rgba(255,150,60,.05)';
    cx.fillRect(0,0,cv.width,cv.height);

    drawSprite(cx,'ship', 2.5*TS-tCamX, 8.6*TS-tCamY, 2.4, false, 0);
    if(((now/500)|0)%3===0){
      cx.fillStyle='rgba(180,180,200,.25)';
      cx.beginPath(); cx.arc(2.9*TS-tCamX, 7.7*TS-tCamY, 3+((now/120)%6), 0, 7); cx.fill();

  }
  if(curMap==='temple'){
    const vg=cx.createRadialGradient(cv.width/2,cv.height/2,80,cv.width/2,cv.height/2,300);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(2,4,12,.65)');
    cx.fillStyle=vg; cx.fillRect(0,0,cv.width,cv.height);
    for(let i=0;i<10;i++){
      const mx=(i*97+((now/40)|0)*(1+i%3))%cv.width;

  updateCritters(dt);
  checkTrailExits();
  if(curMap==='town') for(const c of critters){
    const fx=c.x*TS+TS/2-tCamX, fy=c.y*TS+TS/2-tCamY;

  const ents=[...npcs.filter(n2=>n2.map===curMap).map(n2=>({t:'npc',n:n2, fy:n2.y*TS+TS-2}))];

  ents.sort((a,b)=>a.fy-b.fy);
  for(const e of ents){

      cx.beginPath(); cx.ellipse(fx,fy-2,13,4,0,0,7); cx.fill();
      const hop=((now/420+n2.x)|0)%2?0:-1;

    } else {
      const fx=hero.px+TS/2-tCamX, fy=hero.py+TS-2-tCamY;
      cx.fillStyle='rgba(0,0,0,.4)';
      cx.beginPath(); cx.ellipse(fx,fy-2,13,4,0,0,7); cx.fill();
      const [spr,flip]=heroSprite();
      const step=hero.moving ? (((hero.prog*2)|0)%2?-2:0) : (((now/420)|0)%2?0:-1);
      const walkFlip=(spr!=='dax_side') && hero.moving && ((hero.prog*2)|0)%2===1;
      const useFlip = spr==='dax_side' ? flip : walkFlip;
      let alpha;
      if(tstate==='cutscene'&&cut&&cut.phase==='board') alpha=Math.max(0,1-cut.t/700);
      drawSprite(cx,spr,fx,fy,PXS,useFlip,step,alpha);
    }
  }
  /* launch ship */
  if(tstate==='cutscene'&&cut&&cut.phase!=='done'){
    const sx=cut.ship.x-tCamX, sy=cut.ship.y-tCamY;
    const padPy2=PAD_CENTER.y*TS+TS/2-tCamY;
    const height=Math.max(0,(padPy2+16)-(sy+21));
    const sh=Math.max(.15,1-height/420);
    cx.fillStyle=`rgba(0,0,0,${.45*sh})`;
    cx.beginPath();
    cx.ellipse(PAD_CENTER.x*TS+TS/2-tCamX, padPy2+16, 40*sh, 9*sh, 0, 0, 7);
    cx.fill();
    if(cut.phase==='fly-in'||cut.phase==='lift'){
      const fl=6+Math.sin(now/50)*3;
      cx.fillStyle=animPhase?'#ffd23a':'#ff9a2a';
      cx.fillRect(sx-4, sy+18, 8, fl);
      cx.fillStyle='rgba(255,154,42,.4)';
      cx.fillRect(sx-7, sy+18, 14, fl+5);
    }
    drawSprite(cx,'ship',sx,sy+21,PXS,false,0);
    if(cut.dust.length){
      for(const d of cut.dust){
        d.life+=dt; d.r+=d.sp*dt;
        const a=Math.max(0,.5-d.life/900);
        if(a<=0) continue;
        cx.fillStyle=`rgba(120,100,140,${a})`;
        const px2=PAD_CENTER.x*TS+TS/2-tCamX+Math.cos(d.a)*d.r;
        const py2=PAD_CENTER.y*TS+TS+8-tCamY+Math.sin(d.a)*d.r*.35;
        cx.fillRect(px2,py2,5,3);
      }
      cut.dust=cut.dust.filter(d=>d.life<900);
    }
    if(cut.phase==='fadeout'){
      cx.fillStyle=`rgba(3,4,10,${Math.min(1,cut.t/700)})`;
      cx.fillRect(0,0,cv.width,cv.height);
    }
  }
  if(tfadeDir!==0){
    tfade+=tfadeDir*dt/220;
    if(tfade>=1){ tfade=1; tfadeDir=-1; afterFade&&afterFade(); afterFade=null; tCamInit=false; }
    if(tfade<=0){ tfade=0; tfadeDir=0; }
  }
  if(tfade>0){
    cx.fillStyle=`rgba(3,4,10,${tfade})`;
    cx.fillRect(0,0,cv.width,cv.height);
  }
}

</script>
<script>
/* ═══ NEBULA FORCE — cutscenes.js: space ambush/crash + the Precursor entity.
   Ported from Act 1, rescaled from 576×480 to the shared 480×384 window. ═══ */
let sp=null;
let asteroidCanvas=null;
let entityFired=false;
function makeAsteroid(){
  asteroidCanvas=document.createElement('canvas');
  asteroidCanvas.width=260; asteroidCanvas.height=220;
  const g=asteroidCanvas.getContext('2d');
  const rnd=mulberry(4242);
  const cxp=130, cyp=110;
  g.fillStyle='#3a3048';
  g.beginPath();
  const pts=14;
  for(let i=0;i<=pts;i++){
    const a=i/pts*Math.PI*2;
    const r=84+rnd()*26;
    const x=cxp+Math.cos(a)*r, y=cyp+Math.sin(a)*r*.82;
    if(i===0) g.moveTo(x,y); else g.lineTo(x,y);
  }
  g.closePath(); g.fill();
  g.save(); g.clip();
  g.fillStyle='#544868';
  g.beginPath(); g.ellipse(cxp-30,cyp-30,110,92,0,0,7); g.fill();
  g.fillStyle='#3a3048';
  g.beginPath(); g.ellipse(cxp+14,cyp+14,108,90,0,0,7); g.fill();
  for(let i=0;i<9;i++){
    const x=cxp+(rnd()-.5)*140, y=cyp+(rnd()-.5)*120, r=6+rnd()*14;
    g.fillStyle='#2a2338';
    g.beginPath(); g.arc(x,y,r,0,7); g.fill();
    g.fillStyle='#4a3f5e';
    g.beginPath(); g.arc(x-r*.25,y-r*.25,r*.75,0,7); g.fill();
    g.fillStyle='#241d30';
    g.beginPath(); g.arc(x+r*.12,y+r*.12,r*.55,0,7); g.fill();
  }
  for(let i=0;i<6;i++){
    g.fillStyle='#48e0d0';
    g.fillRect(cxp+(rnd()-.5)*130, cyp+(rnd()-.5)*110, 3,3);
  }
  g.restore();
}
function startSpace(){
  setMode('space');
  const rnd=mulberry(99);
  sp={
    phase:'cruise', t:0, total:0,
    stars:[0,1,2].map(l=>Array.from({length:24},()=>({x:rnd()*cv.width,y:rnd()*cv.height,l}))),
    shipX:126, shipY:170, rot:0,
    drones:[], bolts:[], sparks:[], smoke:[], boomT:-1,
    flash:0, shake:0, astScale:.12, fade:0, cap:'', capT:0,
  };
}
function spCaption(text){ sp.cap=text; sp.capT=0; }
function skipSpace(){
  if(!sp||sp.phase==='out') return;
  sp.phase='out'; sp.t=0; sp.fade=0;
}
function updateSpace(dt,now){
  sp.t+=dt; sp.total+=dt; sp.capT+=dt;
  const spd=(sp.phase==='crash'?2.4:1)*dt*.06;
  for(const layer of sp.stars)for(const s2 of layer){
    s2.x-=spd*(s2.l+1);
    if(s2.x<-4){ s2.x=cv.width+4; s2.y=Math.random()*cv.height; }
  }
  if(sp.phase==='cruise'){
    if(sp.t<50) spCaption("RIGA (comms): Clear of the crater. Shaft nine's on the far side of the belt — sit tight.");
    sp.shipY=170+Math.sin(now/600)*8;
    if(sp.t>2400){
      sp.phase='ambush'; sp.t=0;
      spCaption("PROXIMITY ALERT — unidentified craft closing fast.");
      for(let i=0;i<3;i++){
        sp.drones.push({x:cv.width+60+i*80, y:64+i*92, ph:Math.random()*6, fire:400+i*260});
      }
    }
  } else if(sp.phase==='ambush'){
    sp.shipY=170+Math.sin(now/500)*10;
    for(const d of sp.drones){
      d.x+= (d.x>326? -dt*.16 : Math.sin(now/300+d.ph)*dt*.03);
      d.y+= Math.sin(now/260+d.ph)*dt*.05;
      d.fire-=dt;
      if(d.fire<=0){
        d.fire=520+Math.random()*300;
        sp.bolts.push({x:d.x-20,y:d.y, vx:-.42, vy:(sp.shipY-d.y)/900});
      }
    }
    for(const b of sp.bolts){
      b.x+=b.vx*dt; b.y+=b.vy*dt;
      if(b.x<sp.shipX+52 && b.x>sp.shipX-52 && Math.abs(b.y-sp.shipY)<26 && !b.hit){
        b.hit=true;
        sp.shake=8;
        for(let i=0;i<7;i++) sp.sparks.push({x:b.x,y:b.y,vx:(Math.random()-.2)*.2,vy:(Math.random()-.5)*.25,t:0});
      }
    }
    sp.bolts=sp.bolts.filter(b=>!b.hit&&b.x>-20);
    if(sp.t>2800){
      sp.phase='hit'; sp.t=0; sp.boomT=0;
      sp.flash=1; sp.shake=18;
      spCaption("RIGA (comms): Engine two is GONE — you're venting! Get her down somewhere, ANYWHERE—");
    }
  } else if(sp.phase==='hit'){
    sp.rot=Math.min(.28, sp.rot+dt*.0002);
    sp.shipY+=dt*.02;
    if(sp.boomT>=0) sp.boomT+=dt;
    if((now|0)%70<20) sp.smoke.push({x:sp.shipX-40,y:sp.shipY+8,r:4,t:0});
    for(const d of sp.drones){ d.x+=dt*.3; d.y-=dt*.08; }
    if(sp.t>1700){
      sp.phase='crash'; sp.t=0;
      spCaption("DAX: Brace! Putting her down on that rock—");
    }
  } else if(sp.phase==='crash'){
    const p=Math.min(1,sp.t/2600);
    sp.astScale=.12+p*p*3.2;
    sp.rot=.28+p*.3;
    sp.shipX=126+p*118;
    sp.shipY=170+p*108;
    if((now|0)%60<20) sp.smoke.push({x:sp.shipX-40,y:sp.shipY,r:4,t:0});
    if(p>=1){
      sp.phase='impact'; sp.t=0; sp.flash=1; sp.shake=26;
    }
  } else if(sp.phase==='impact'){
    if(sp.t>420){ sp.phase='out'; sp.t=0; }
  } else if(sp.phase==='out'){
    sp.fade=Math.min(1,sp.t/650);
    if(sp.t>900){
      sp=null;
      startBattle(MISSION_KR7);
      return;
    }
  }
  for(const s2 of sp.sparks){ s2.t+=dt; s2.x+=s2.vx*dt; s2.y+=s2.vy*dt; }
  sp.sparks=sp.sparks.filter(s2=>s2.t<500);
  for(const sm of sp.smoke){ sm.t+=dt; sm.x-=dt*.06; sm.y-=dt*.015; sm.r+=dt*.012; }
  sp.smoke=sp.smoke.filter(sm=>sm.t<1600);
  sp.flash=Math.max(0,sp.flash-dt/380);
  sp.shake=Math.max(0,sp.shake-dt/40);
}
function drawSpace(now){
  const g=cx;
  g.save();
  if(sp.shake>0) g.translate((Math.random()-.5)*sp.shake,(Math.random()-.5)*sp.shake);
  const gr=g.createLinearGradient(0,0,0,cv.height);
  gr.addColorStop(0,'#04050f'); gr.addColorStop(1,'#0c0a22');
  g.fillStyle=gr; g.fillRect(-30,-30,cv.width+60,cv.height+60);
  for(const layer of sp.stars)for(const s2 of layer){
    g.fillStyle=`rgba(210,225,255,${.25+s2.l*.3})`;
    const len=(sp.phase==='crash'?6+s2.l*6:0);
    g.fillRect(s2.x,s2.y,2+len,2);
  }
  if(sp.phase==='crash'||sp.phase==='impact'||sp.phase==='hit'){
    const sc=sp.astScale;
    const ax=cv.width*.72, ay=cv.height*.66;
    g.save();
    g.translate(ax,ay);
    g.scale(sc,sc);
    g.drawImage(asteroidCanvas,-130,-110);
    g.restore();
  }
  for(const sm of sp.smoke){
    g.fillStyle=`rgba(90,90,105,${Math.max(0,.5-sm.t/1600)})`;
    g.beginPath(); g.arc(sm.x,sm.y,sm.r,0,7); g.fill();
  }
  g.save();
  g.translate(sp.shipX,sp.shipY);
  g.rotate(sp.rot);
  if(sp.phase==='cruise'||sp.phase==='ambush'){
    const fl=10+Math.sin(now/40)*4;
    g.fillStyle=animPhase?'#ffd23a':'#ff9a2a';
    g.fillRect(-58-fl,-5,fl+6,10);
    g.fillStyle='rgba(255,154,42,.35)';
    g.fillRect(-66-fl,-8,fl+10,16);
  }
  if(sp.phase==='hit'||sp.phase==='crash'){
    const fl=6+Math.sin(now/30)*4;
    g.fillStyle=animPhase?'#ff9a2a':'#e83048';
    g.fillRect(-50,-2,fl+8,8);
  }
  drawSprite(g,'ship',0,28,4,false,0);
  g.restore();
  if(sp.boomT>=0&&sp.boomT<600){
    const p=sp.boomT/600;
    g.strokeStyle=`rgba(255,154,42,${1-p})`;
    g.lineWidth=6;
    g.beginPath(); g.arc(sp.shipX-40,sp.shipY+4,10+p*70,0,7); g.stroke();
    g.strokeStyle=`rgba(255,210,58,${1-p})`;
    g.lineWidth=3;
    g.beginPath(); g.arc(sp.shipX-40,sp.shipY+4,4+p*44,0,7); g.stroke();
    g.lineWidth=1;
  }
  for(const d of sp.drones){
    drawSprite(g,'drone',d.x,d.y+24,3,false,Math.sin(now/200+d.ph)*3);
  }
  for(const b of sp.bolts){
    g.fillStyle=animPhase?'#ff6070':'#e83048';
    g.fillRect(b.x,b.y-2,14,4);
  }
  for(const s2 of sp.sparks){
    g.fillStyle=`rgba(255,210,58,${1-s2.t/500})`;
    g.fillRect(s2.x,s2.y,4,4);
  }
  if(sp.phase==='hit'||sp.phase==='crash'){
    const a=.10+.08*Math.sin(now/160);
    g.fillStyle=`rgba(232,48,72,${a})`;
    g.fillRect(-30,-30,cv.width+60,26+30);
    g.fillRect(-30,cv.height+4,cv.width+60,30);
  }
  g.restore();
  if(sp.flash>0){
    g.fillStyle=`rgba(255,246,230,${sp.flash})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
  if(sp.cap){
    g.fillStyle='rgba(4,5,14,.82)';
    g.fillRect(0,cv.height-70,cv.width,70);
    g.fillStyle='#ffd23a';
    g.fillRect(0,cv.height-70,cv.width,3);
    g.fillStyle='#e8ecff';
    g.font='11px "IBM Plex Mono", monospace';
    g.textAlign='left'; g.textBaseline='top';
    const shown=sp.cap.slice(0, Math.floor(sp.capT/14));
    wrapText(g, shown, 14, cv.height-56, cv.width-28, 16);
  }
  g.fillStyle='rgba(154,166,216,.8)';
  g.font='8px "Press Start 2P", monospace';
  g.textAlign='right'; g.textBaseline='top';
  g.fillText('SKIP ▸', cv.width-10, 10);
  if(sp.fade>0){
    g.fillStyle=`rgba(3,4,10,${sp.fade})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
}

/* ═══ THE ENTITY ═══ */
const ENT_LINES=[
  "The altar wakes. Light without heat. A voice without sound.",
  "?????: Do not be afraid. Fear is a luxury of creatures who believe they have time.",
  "?????: We speak to you across ten thousand years — from a future that is already dying. Reaching this far back cost us... more than you have words for.",
  "?????: A hunger is crossing the dark between galaxies. It does not conquer. It UNWRITES. Where it passes, every 'was' and every 'will be' simply... stops.",
  "?????: The relic in your pack is the first of five. Our ancestors — the ones you call the Precursors — scattered them so no single hand could wield what they lock away.",
  "?????: Gather them. Before the hunger does. It is already listening for their song... and child — you have made the song LOUDER.",
  "The light folds away. The crystals dim, one by one, like eyes closing. Somewhere above the temple, the stars feel colder than they did an hour ago.",
];
let ent=null;
function startEntity(){
  setMode('entity');
  ent={line:0, capT:0, out:false, fade:0, t:0};
}
function entAdvance(){
  if(!ent||ent.out) return;
  const full=ENT_LINES[ent.line];
  if(Math.floor(ent.capT/16)<full.length){ ent.capT=full.length*16; return; }
  ent.line++;
  ent.capT=0;
  if(ent.line>=ENT_LINES.length){ ent.out=true; ent.t=0; }
}
function drawEntity(now,dt){
  ent.t+=dt; ent.capT+=dt;
  const g=cx;
  g.fillStyle='#020309'; g.fillRect(0,0,cv.width,cv.height);
  g.save();
  g.translate(cv.width/2, 160);
  for(let i=0;i<7;i++){
    const r2=28+i*28+Math.sin(now/700+i)*5;
    g.strokeStyle=`rgba(72,180,224,${.16-.018*i})`;
    g.lineWidth=2;
    g.beginPath();
    g.ellipse(0,0,r2,r2*.42, now/4000*(i%2?1:-1), 0, 7);
    g.stroke();
  }
  g.restore();
  g.fillStyle='#1c2334'; g.fillRect(cv.width/2-60,300,120,22);
  g.fillStyle='#324058'; g.fillRect(cv.width/2-60,300,120,4);
  g.fillStyle='#0a3844'; g.fillRect(cv.width/2-9,278,18,24);
  g.fillStyle='#48e0d0'; g.fillRect(cv.width/2-3,272,6,30);
  const appear=Math.min(1,ent.t/1400);
  const fy=266+Math.sin(now/800)*7;
  const rg=g.createRadialGradient(cv.width/2,fy-70,8,cv.width/2,fy-70,130);
  rg.addColorStop(0,`rgba(124,232,255,${.30*appear})`);
  rg.addColorStop(1,'rgba(124,232,255,0)');
  g.fillStyle=rg; g.fillRect(cv.width/2-140,fy-210,280,280);
  drawGlowOutline(g,'entity',cv.width/2,fy,7,false,0,'#7ce8ff',.20*appear);
  drawSprite(g,'entity',cv.width/2,fy,7,false,0,appear*.94);
  const sy2=(now/9)%cv.height;
  g.fillStyle='rgba(124,232,255,.06)';
  g.fillRect(0,sy2,cv.width,3);
  const full=ENT_LINES[Math.min(ent.line,ENT_LINES.length-1)];
  if(!ent.out){
    g.fillStyle='rgba(4,5,14,.85)';
    g.fillRect(0,cv.height-84,cv.width,84);
    g.fillStyle='#7ce8ff';
    g.fillRect(0,cv.height-84,cv.width,3);
    g.fillStyle='#e8ecff';
    g.font='11px "IBM Plex Mono", monospace';
    g.textAlign='left'; g.textBaseline='top';
    const shown=full.slice(0, Math.floor(ent.capT/16));
    wrapText(g, shown, 14, cv.height-70, cv.width-28, 16);
    if(shown.length>=full.length){
      g.fillStyle=`rgba(255,210,58,${(Math.sin(now/240)+1)/2})`;
      g.font='11px "Press Start 2P", monospace';
      g.textAlign='right';
      g.fillText('▼', cv.width-12, cv.height-20);
    }
  } else {
    /* the entity's exit: everything folds into white */
    if(ent.t<1200){
      g.fillStyle=`rgba(255,255,255,${Math.min(1,ent.t/1200)})`;
      g.fillRect(0,0,cv.width,cv.height);
    } else if(ent.t<2900){
      /* hold on shimmering white — light with a pulse in it */
      g.fillStyle='#ffffff'; g.fillRect(0,0,cv.width,cv.height);
      for(let i=0;i<6;i++){
        const by=((now/22)*(1+i*0.35)+i*140)%(cv.height+120)-60;
        g.fillStyle=`rgba(200,232,255,${.10+.08*Math.sin(now/180+i)})`;
        g.fillRect(0,by,cv.width,26+i*6);
      }
      g.fillStyle=`rgba(124,232,255,${.05+.05*Math.sin(now/90)})`;
      g.fillRect(0,0,cv.width,cv.height);
    } else if(ent.t<3300){
      g.fillStyle='#000'; g.fillRect(0,0,cv.width,cv.height);
    } else {
      ent=null;
      startReturnFlight();
    }
  }
}

/* ═══ THE RETURN — unbroken sky, a crew full of memories, a new heading ═══ */
const RF_LINES=[
  "RIGA (comms, crackling): …transponder says you're STILL on approach to shaft nine. You never left my scope. Where have you BEEN for the last—  …hello?",
  "JET: Okay. Hands up. Who else remembers dying a little?",
  "GUNNAR-7: Hull integrity one hundred percent. Combat log: present. Damage: absent. This is upsetting my file system.",
  "VESPER: It didn't send us back. It folded the bad part closed. The fight still happened — just… somewhere it keeps.",
  "KHARN: The wound is gone. The memory isn't. That is how a scar is SUPPOSED to work, little psion. I like this entity.",
  "SISTER HALE: Five relics. A hunger that unwrites. And one shuttle full of witnesses. The Verdanth would call that a calling.",
  "DAX: Then we answer it. Riga — log a new heading. Past the belt. Past everything.",
  "The relic in Dax's pack sings one clear, bright note — and the stars begin to stretch.",
];
let rf=null;
function startReturnFlight(){
  setMode('return');
  const rnd=mulberry(313);
  rf={
    lines:RF_LINES.filter(l=>!(lostCrew.has('jet')&&l.indexOf('JET:')===0)),
    phase:'talk', line:0, capT:0, t:0,
    stars:[0,1,2].map(l=>Array.from({length:24},()=>({x:rnd()*cv.width,y:rnd()*cv.height,l}))),
    shipX:150, shipY:180,
    warpFlash:0, planetR:0, fade:0,
  };
}
function rfAdvance(){
  if(!rf||rf.phase!=='talk') return;
  const full=rf.lines[rf.line];
  if(Math.floor(rf.capT/15)<full.length){ rf.capT=full.length*15; return; }
  rf.line++;
  rf.capT=0;
  if(rf.line>=rf.lines.length){ rf.phase='warp'; rf.t=0; }
}
function updateReturn(dt,now){
  rf.t+=dt; rf.capT+=dt;
  const warp=rf.phase==='warp';
  const spd=(warp? 2+rf.t/220 : 1)*dt*.06;
  for(const layer of rf.stars)for(const s2 of layer){
    s2.x-=spd*(s2.l+1);
    if(s2.x<-60){ s2.x=cv.width+10; s2.y=Math.random()*cv.height; }
  }
  if(rf.phase==='talk'){
    rf.shipY=180+Math.sin(now/620)*7;
  } else if(rf.phase==='warp'){
    rf.shipY=180;
    if(rf.t>1500){ rf.warpFlash=1; }
    if(rf.t>1750){ rf.phase='arrive'; rf.t=0; }
  } else if(rf.phase==='arrive'){
    rf.warpFlash=Math.max(0,rf.warpFlash-dt/500);
    const p=Math.min(1,rf.t/3000);
    rf.planetR=8+ease(p)*118;
    rf.shipX=150+ease(p)*60;
    if(rf.t>3400){ rf.phase='land'; rf.t=0; }
  } else if(rf.phase==='land'){
    rf.fade=Math.min(1,rf.t/750);
    if(rf.t>1050){ rf=null; enterVantorr(); }
  }
}
function drawReturn(now){
  const g=cx;
  const gr=g.createLinearGradient(0,0,0,cv.height);
  gr.addColorStop(0,'#04050f'); gr.addColorStop(1,'#0c0a22');
  g.fillStyle=gr; g.fillRect(0,0,cv.width,cv.height);
  const warp=rf.phase==='warp';
  for(const layer of rf.stars)for(const s2 of layer){
    g.fillStyle=`rgba(210,225,255,${.25+s2.l*.3})`;
    const len=warp? Math.min(90,4+(rf.t/28)*(s2.l+1)) : 0;
    g.fillRect(s2.x,s2.y,2+len,2);
  }
  /* the ringlit world */
  if(rf.phase==='arrive'||rf.phase==='land'){
    const px2=cv.width*.68, py2=cv.height*.44, R=rf.planetR;
    const rg=g.createRadialGradient(px2-R*.3,py2-R*.3,R*.15,px2,py2,R);
    rg.addColorStop(0,'#ffb35a'); rg.addColorStop(.55,'#e87830'); rg.addColorStop(1,'#8a3a12');
    /* rings behind */
    const ringCols=['#48e0d0','#ff5ad2','#b8ff4a'];
    g.save(); g.translate(px2,py2); g.rotate(-.32);
    for(let i=0;i<3;i++){
      g.strokeStyle=ringCols[i];
      g.globalAlpha=.85;
      g.lineWidth=Math.max(1.5,R*.045);
      g.beginPath(); g.ellipse(0,0,R*(1.45+i*.22),R*(.42+i*.07),0,Math.PI*0.03,Math.PI*0.97,true); g.stroke();
    }
    g.restore(); g.globalAlpha=1;
    g.fillStyle=rg;
    g.beginPath(); g.arc(px2,py2,R,0,7); g.fill();
    g.fillStyle='rgba(4,5,15,.45)';
    g.beginPath(); g.arc(px2+R*.34,py2+R*.2,R,0,7); g.fill();
    /* rings in front */
    g.save(); g.translate(px2,py2); g.rotate(-.32);
    for(let i=0;i<3;i++){
      g.strokeStyle=ringCols[i];
      g.globalAlpha=.95;
      g.lineWidth=Math.max(1.5,R*.045);
      g.beginPath(); g.ellipse(0,0,R*(1.45+i*.22),R*(.42+i*.07),0,-Math.PI*0.03,Math.PI*0.03); g.stroke();
      g.beginPath(); g.ellipse(0,0,R*(1.45+i*.22),R*(.42+i*.07),0,Math.PI*0.97,Math.PI*1.03); g.stroke();
    }
    g.restore(); g.globalAlpha=1;
  }
  /* the shuttle, whole and unburnt */
  g.save();
  g.translate(rf.shipX,rf.shipY);
  const fl=10+Math.sin(now/40)*4;
  g.fillStyle=animPhase?'#ffd23a':'#ff9a2a';
  g.fillRect(-58-fl,-5,fl+6,10);
  g.fillStyle='rgba(255,154,42,.35)';
  g.fillRect(-66-fl,-8,fl+10,16);
  drawSprite(g,'ship',0,28,4,false,0);
  g.restore();
  if(rf.warpFlash>0){
    g.fillStyle=`rgba(240,250,255,${rf.warpFlash})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
  /* captions */
  let cap=null;
  if(rf.phase==='talk') cap=rf.lines[Math.min(rf.line,rf.lines.length-1)];
  else if(rf.phase==='arrive'&&rf.t>900) cap="Vantorr — the ringlit world. Three broken halos, still glowing after ten thousand years. Portside beacon: Ceril's Crossing.";
  if(cap){
    g.fillStyle='rgba(4,5,14,.82)';
    g.fillRect(0,cv.height-70,cv.width,70);
    g.fillStyle='#ffd23a';
    g.fillRect(0,cv.height-70,cv.width,3);
    g.fillStyle='#e8ecff';
    g.font='11px "IBM Plex Mono", monospace';
    g.textAlign='left'; g.textBaseline='top';
    const shown=rf.phase==='talk'?cap.slice(0, Math.floor(rf.capT/15)):cap;
    wrapText(g, shown, 14, cv.height-58, cv.width-28, 15);
    if(rf.phase==='talk'&&shown.length>=cap.length){
      g.fillStyle=`rgba(255,210,58,${(Math.sin(now/240)+1)/2})`;
      g.font='10px "Press Start 2P", monospace';
      g.textAlign='right';
      g.fillText('▼', cv.width-12, cv.height-18);
    }
  }
  if(rf.fade>0){
    g.fillStyle=`rgba(3,4,10,${rf.fade})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
}

/* ═══ OPENING — Penal Station VK-9. A man, a robot, a nine-year promise. ═══ */
const IN_LINES=[
  "PENAL STATION VK-9. Charge: salvage-rights fraud. Sentence: nine years. Served: all nine.",
  "GATE WARDEN: Personal effects — one jacket, one empty pack. Transport request: denied, nobody visits VK-9. ...Correction. Incoming vessel. Nobody EVER visits VK-9.",
  "GUNNAR-7: UNIT REACTIVATED. Suspended animation elapsed: nine years, fourteen days. Reason for suspension: you said 'wait for me.' Query: what took so long.",
  "DAX: ...You waited. You put yourself in a crate for nine years, you glorious rusted idiot, and you WAITED.",
  "GUNNAR-7: Also acquired during interval, at auction, with nine years of accrued interest: FLIGHT MODE. Warranty void. Boarding is now.",
  "DAX: New rules, Gunnar. No crews we can't trust. No jobs we can't walk away from. We find honest work and we keep our heads down—",
  "GUNNAR-7: Destination: Rustharbor Colony. Distinguishing features: nobody asks what you did. Current job postings: one. It is digging.",
  "DAX: Digging. Perfect. How much trouble can one hole in a rock possibly be?",
];
let iv=null;
function startIntro(){
  setMode('return'); /* reuse the cinematic mode plumbing */
  const rnd=mulberry(191);
  iv={kind:'intro', line:0, capT:0, t:0,
    stars:[0,1,2].map(l=>Array.from({length:22},()=>({x:rnd()*cv.width,y:rnd()*cv.height,l}))),
    flash:0, fade:0};
  rf=null;
}
function ivStage(){ return iv.line<=1?'gate' : iv.line<=3?'reunion' : iv.line===4?'transform' : iv.line<=6?'flight' : 'approach'; }
function ivAdvance(){
  if(!iv) return;
  const full=IN_LINES[Math.min(iv.line,IN_LINES.length-1)];
  if(iv.line<IN_LINES.length && Math.floor(iv.capT/15)<full.length){ iv.capT=full.length*15; return; }
  iv.line++; iv.capT=0;
  if(iv.line===5) iv.flash=1;
  if(iv.line>=IN_LINES.length) iv.done=performance.now();
}
function updateIntro(dt){
  iv.t+=dt; iv.capT+=dt;
  iv.flash=Math.max(0,iv.flash-dt/450);
  const st=ivStage();
  const spd=(st==='flight'||st==='approach')?dt*.06:dt*.008;
  for(const layer of iv.stars)for(const s2 of layer){
    s2.x-=spd*(s2.l+1);
    if(s2.x<-10){ s2.x=cv.width+8; s2.y=Math.random()*cv.height; }
  }
  if(iv.done){
    iv.fade=Math.min(1,(performance.now()-iv.done)/800);
    if(iv.fade>=1){
      iv=null;
      setMode('town');
      openDialog('RUSTHARBOR',[
        "Rustharbor Colony — three terraces carved into an old impact crater. Population: miners, moss farmers, and people who came here to be nobody in particular.",
        "You have: one jacket, one empty pack, one magnificent robot, and zero credits. FOREMAN OKARI runs the digs from the plaza. Word is he's hiring.",
      ]);
    }
  }
}
function drawIntro(now){
  const g=cx;
  const st=ivStage();
  const gr=g.createLinearGradient(0,0,0,cv.height);
  gr.addColorStop(0,'#04050f'); gr.addColorStop(1, st==='gate'?'#12081a':'#0c0a22');
  g.fillStyle=gr; g.fillRect(0,0,cv.width,cv.height);
  for(const layer of iv.stars)for(const s2 of layer){
    g.fillStyle=`rgba(210,225,255,${.2+s2.l*.28})`;
    const len=(st==='flight'||st==='approach')? 3+(s2.l*4) : 0;
    g.fillRect(s2.x,s2.y,2+len,2);
  }
  if(st==='gate'||st==='reunion'||st==='transform'){
    /* Penal Station VK-9 — a wall of cold light and one open gate */
    const gx=cv.width-170;
    g.fillStyle='#0e1018';
    g.fillRect(gx,40,170,260);
    g.fillStyle='#161a26';
    for(let i=0;i<5;i++) g.fillRect(gx+12+i*32,54,20,232);
    for(let i=0;i<5;i++)for(let j2=0;j2<9;j2++){
      g.fillStyle=((i*3+j2+((now/900)|0))%7===0)?'#e83048':'#232a3c';
      g.fillRect(gx+16+i*32,62+j2*25,10,6);
    }
    g.fillStyle='#04050c';
    g.fillRect(gx-2,222,44,78);
    g.strokeStyle='#e83048';
    g.strokeRect(gx-2,222,44,78);
    g.fillStyle='#e83048';
    g.font='7px "Press Start 2P", monospace';
    g.textAlign='left'; g.fillText('VK-9', gx+6, 216);
    /* Dax outside the gate */
    const groundY=300;
    g.fillStyle='#12141f';
    g.fillRect(0,groundY,cv.width,cv.height-groundY);
    const hop=((now/400)|0)%2?0:-1;
    drawSprite(g,'dax', gx-56, groundY, 3.4, false, 0);
    if(st==='gate'&&iv.line===1){
      /* running lights of something approaching, top-left */
      const p=(now/900)%1;
      g.fillStyle='#ffd23a';
      g.fillRect(40+p*60, 46+p*30, 4,4);
      g.fillStyle='#48e0d0';
      g.fillRect(30+p*60, 52+p*30, 3,3);
    }
    if(st==='reunion'||st==='transform'){
      /* Gunnar down, or already down */
      const descend = iv.line===2 ? Math.min(1, iv.capT/1400) : 1;
      const gy=groundY-(1-ease(descend))*220;
      if(descend<1){
        g.fillStyle=animPhase?'#ffd23a':'#ff9a2a';
        g.fillRect(gx-118, gy+4, 8, 14);
        g.fillRect(gx-98, gy+4, 8, 14);
      }
      drawSprite(g,'gunnar', gx-104, gy, 3.4, true, descend<1?0:hop);
    }
    if(st==='transform'){
      /* the shimmer of a robot who bought himself wings */
      const ring=(iv.capT%900)/900;
      g.strokeStyle=`rgba(72,224,208,${.8*(1-ring)})`;
      g.lineWidth=3;
      g.beginPath(); g.arc(gx-104, groundY-24, 8+ring*46, 0, 7); g.stroke();
      g.lineWidth=1;
    }
  }
  if(st==='flight'||st==='approach'){
    /* Gunnar, flight mode: a small proud ship with a green hull-light */
    const sy=170+Math.sin(now/540)*8;
    g.save();
    g.translate(150,sy);
    const fl=8+Math.sin(now/45)*3;
    g.fillStyle=animPhase?'#ffd23a':'#ff9a2a';
    g.fillRect(-46-fl,-4,fl+5,8);
    drawSprite(g,'ship',0,22,3,false,0);
    g.fillStyle='#48e060';
    g.fillRect(10,-14,4,4);
    g.restore();
    if(st==='approach'){
      /* Rustharbor: a cratered brown rock with terrace lights */
      const p=Math.min(1, iv.capT/2600);
      const R=20+ease(p)*95;
      const px2=cv.width*.72, py2=cv.height*.42;
      const rg=g.createRadialGradient(px2-R*.3,py2-R*.3,R*.2,px2,py2,R);
      rg.addColorStop(0,'#8a6a4a'); rg.addColorStop(.6,'#5e4630'); rg.addColorStop(1,'#2e2014');
      g.fillStyle=rg;
      g.beginPath(); g.arc(px2,py2,R,0,7); g.fill();
      g.fillStyle='rgba(20,14,8,.7)';
      for(const [cx3,cy3,cr] of [[-.4,-.2,.18],[.3,.35,.14],[.1,-.45,.11],[-.15,.4,.1]]){
        g.beginPath(); g.arc(px2+cx3*R, py2+cy3*R, cr*R, 0, 7); g.fill();
      }
      if(R>60){
        g.fillStyle='#ffd23a';
        for(let i=0;i<7;i++) g.fillRect(px2-R*.25+i*R*.08, py2+R*.05+(i%2)*3, 2, 2);
      }
    }
  }
  if(iv.flash>0){
    g.fillStyle=`rgba(240,250,255,${iv.flash})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
  /* caption */
  const line=IN_LINES[Math.min(iv.line,IN_LINES.length-1)];
  if(iv.line<IN_LINES.length){
    g.fillStyle='rgba(4,5,14,.84)';
    g.fillRect(0,cv.height-70,cv.width,70);
    g.fillStyle='#ffd23a';
    g.fillRect(0,cv.height-70,cv.width,3);
    g.fillStyle='#e8ecff';
    g.font='11px "IBM Plex Mono", monospace';
    g.textAlign='left'; g.textBaseline='top';
    const shown=line.slice(0, Math.floor(iv.capT/15));
    wrapText(g, shown, 14, cv.height-58, cv.width-28, 15);
    if(shown.length>=line.length){
      g.fillStyle=`rgba(255,210,58,${(Math.sin(now/240)+1)/2})`;
      g.font='10px "Press Start 2P", monospace';
      g.textAlign='right';
      g.fillText('▼', cv.width-12, cv.height-18);
    }
  }
  g.fillStyle='rgba(154,166,216,.7)';
  g.font='7px "Press Start 2P", monospace';
  g.textAlign='right'; g.textBaseline='top';
  g.fillText('TAP ▸', cv.width-8, 8);
  if(iv.fade>0){
    g.fillStyle=`rgba(3,4,10,${iv.fade})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
}

<script>
/* ═══ NEBULA FORCE — battle.js: mission-driven tactical battle engine.
   A battle is started with startBattle(mission) — see js/missions/ for the
   mission format. Systems: AGI-variance turn order, free reposition until
   you act, land-effect evasion, one ✦ special per unit per battle,
   XP/leveling with wild rolls + floors, asteroid storm, boss phases,
   optional reinforcements, cinematic scenes (FAST skips them). ═══ */
const BCOLS=18, BROWS=13, BT=48;
const XP_PER_LEVEL=25;
const TERRAIN={
  0:{name:'Regolith', cost:1, le:0},
  1:{name:'Boulders', cost:2, le:0.15},
  2:{name:'Hull debris cover', cost:2, le:0.30},
  3:{name:'Crystal vent', cost:1, le:0, hazard:3},
  4:{name:'Open void', cost:1, le:0, void:true},
  5:{name:'Sealed seam', cost:1, le:0, seam:true},
  6:{name:'Lime sump', cost:2, le:0.10, hazard:2},
  7:{name:'Black goo', cost:1, le:0, void:true},
  8:{name:'Spore thicket', cost:2, le:0.30},
};
let bGrid=[], chasmTiles=[];
const DIRS=[[1,0],[-1,0],[0,1],[0,-1]];
let mission=null;

/* — camera: the screen is a 10×8 window onto the field — */
const WORLD_W=BCOLS*BT, WORLD_H=BROWS*BT;
let camX=0, camY=0, camTX=0, camTY=0;
function clampCam(v,max){ return Math.max(0, Math.min(max, v)); }
function camFocus(wx,wy){
  camTX=clampCam(wx-cv.width/2, WORLD_W-cv.width);
  camTY=clampCam(wy-cv.height/2, WORLD_H-cv.height);
}
function focusUnit(u){ camFocus(u.x*BT+BT/2, u.y*BT+BT/2); }
function focusPair(a,b){ camFocus((a.x+b.x)/2*BT+BT/2, (a.y+b.y)/2*BT+BT/2); }

/* — screen-fit: everything on one screen, no scrolling, any device — */
function fitLayout(){
  const headH=document.querySelector('header').offsetHeight;
  const uiH=document.getElementById('ui').offsetHeight;
  const availW=Math.min(window.innerWidth-12, 720);
  const availH=window.innerHeight-headH-uiH-30;
  const scale=Math.max(.4, Math.min(availW/cv.width, availH/cv.height));
  const w=Math.floor(cv.width*scale);
  document.getElementById('stage').style.width=w+'px';
  document.getElementById('ui').style.maxWidth=Math.max(w,300)+'px';
}
addEventListener('resize',fitLayout);

/* — tile art — */
const batTiles={};
let batTilesMade=false;
function makeBattleTiles(){
  if(batTilesMade) return;
  batTilesMade=true;
  for(let type=0; type<=8; type++){
    batTiles[type]=[];
    for(let v=0; v<2; v++){
      const c=document.createElement('canvas'); c.width=BT; c.height=BT;
      const g2=c.getContext('2d');
      const rnd=mulberry(type*7+v*131+55);
      if(type!==4){
        rr(g2,0,0,16,16, v?'#3c3350':'#38304a');
        for(let i=0;i<8;i++) pxr(g2,(rnd()*16)|0,(rnd()*16)|0, rnd()<.5?'#463a58':'#2e2740');
        for(let i=0;i<3;i++){
          const px2=(rnd()*13)|0, py2=(rnd()*13)|0;
          pxr(g2,px2,py2,'#241d30'); pxr(g2,px2+1,py2,'#241d30');
          pxr(g2,px2,py2-1,'#544868');
        }
      }
      if(type===1){
        const spots=[[3,8,5,5],[9,3,4,4],[7,11,4,3]];
        for(const [sx,sy,w,h] of spots){
          rr(g2,sx,sy,w,h,'#5a4e72');
          rr(g2,sx,sy,w,1,'#786a94');
          rr(g2,sx+w-1,sy+1,1,h-1,'#3a3050');
          pxr(g2,sx+1,sy+h-1,'#2c2440');
        }
        if(v) rr(g2,1,2,3,3,'#5a4e72');
      }
      if(type===2){
        rr(g2,2,4,12,9,'#2a3a44');
        rr(g2,2,4,12,1,'#44586a');
        rr(g2,2,12,12,1,'#18242c');
        rr(g2,2,8,12,1,'#1e2c36');
        pxr(g2,4,6,'#44586a'); pxr(g2,11,10,'#18242c');
        rr(g2,5,2,4,2,'#8a3a30');
        pxr(g2,12,5,'#48e0d0');
      }
      if(type===3){
        for(const [px2,py2,h] of [[5,10,4],[8,8,6],[11,11,3],[3,7,3]]){
          rr(g2,px2,py2-h,2,h,'#2c8a7e');
          rr(g2,px2,py2-h,1,h,'#48e0d0');
          pxr(g2,px2,py2-h,'#a8f8ec');
        }
      }
      if(type===4){
        rr(g2,0,0,16,16,'#04050c');
        for(let i=0;i<4;i++){
          const b=.3+rnd()*.6;
          g2.fillStyle=`rgba(200,220,255,${b})`;
          g2.fillRect(((rnd()*15)|0)*PXS, ((rnd()*15)|0)*PXS, rnd()<.7?2:3, rnd()<.7?2:3);
        }
        g2.fillStyle='rgba(120,80,200,.10)';
        g2.beginPath(); g2.arc(rnd()*BT, rnd()*BT, 14+rnd()*10, 0, 7); g2.fill();
        if(v){ g2.fillStyle='#241d30'; g2.fillRect(0,0,BT,4); }
      }
      if(type===6){ /* lime sump — walkable, stings */
        rr(g2,1,1,14,14,'#1a3a14');
        rr(g2,2,2,12,12,'#2a5a1e');
        for(let i=0;i<6;i++) pxr(g2,(2+rnd()*12)|0,(2+rnd()*12)|0,'#8be04e');
        for(let i=0;i<4;i++) pxr(g2,(2+rnd()*12)|0,(2+rnd()*12)|0,'#48e060');
        pxr(g2,(3+rnd()*10)|0,(3+rnd()*10)|0,'#d8ff9a');
        if(v){ rr(g2,4,7,8,2,'#3a7a28'); }
      }
      if(type===7){ /* black goo — nothing walks it */
        rr(g2,0,0,16,16,'#05070a');
        rr(g2,1,1,14,1,'#101a12');
        for(let i=0;i<3;i++) pxr(g2,(rnd()*15)|0,(rnd()*15)|0,'#12241a');
        pxr(g2,(rnd()*14)|0,(rnd()*14)|0,'#1e4a2e');
        if(v) pxr(g2,(rnd()*14)|0,(rnd()*14)|0,'#8be04e');
      }
      if(type===8){ /* spore thicket — heavy cover */
        rr(g2,0,0,16,16,'#241d30');
        for(const [fx,fy,fh] of [[3,13,6],[6,14,8],[10,13,7],[13,14,5]]){
          rr(g2,fx,fy-fh,1,fh,'#3a6a3a');
          rr(g2,fx-1,fy-fh,3,2,'#6a3aa8');
          pxr(g2,fx,fy-fh-1,'#b47ae8');
        }
        for(let i=0;i<4;i++) pxr(g2,(rnd()*15)|0,(10+rnd()*5)|0,'#2a5a1e');
        if(v) pxr(g2,8,4,'#d8ff9a');
      }
      if(type===5){
        g2.strokeStyle='#241d30'; g2.lineWidth=2.5;
        g2.beginPath(); g2.moveTo(4,40); g2.lineTo(16,26); g2.lineTo(12,12); g2.lineTo(26,4); g2.stroke();
        g2.beginPath(); g2.moveTo(44,10); g2.lineTo(30,22); g2.lineTo(38,38); g2.stroke();
        g2.strokeStyle='rgba(72,224,208,.30)'; g2.lineWidth=1;
        g2.beginPath(); g2.moveTo(5,41); g2.lineTo(17,27); g2.lineTo(13,13); g2.stroke();
        g2.beginPath(); g2.moveTo(43,11); g2.lineTo(31,23); g2.lineTo(39,39); g2.stroke();
      }
      batTiles[type].push(c);
    }
  }
}

/* — units — */
function mkUnit(o){
  const u=Object.assign({
    alive:true, fly:false, rng:[1,1], maxmp:0,
    lvl:1, xp:0, spells:[], learn:{}, special:null, boss:false,
    bulwark:false, regen:0,
    ox:0, oy:0, flash:0, walk:null,
  }, o);
  u.hp=u.maxhp; u.mp=u.maxmp;
  u.base={maxhp:u.maxhp, atk:u.atk, def:u.def, agi:u.agi, maxmp:u.maxmp};
  return u;
}
let units=[];
function rosterInit(){
  units=[];
  for(const cd of CREW_DATA){
    const pos=mission.deploy[cd.id];
    if(!pos) continue;
    if(lostCrew.has(cd.id)) continue; /* missed forever */
    const u=mkUnit({
      id:cd.id, name:cd.name, spr:cd.spr, cls:cd.cls, side:'ally',
      x:pos[0], y:pos[1],
      maxhp:cd.maxhp, atk:cd.atk, def:cd.def, agi:cd.agi, mov:cd.mov,
      fly:!!cd.fly, maxmp:cd.maxmp||0,
      spells:(cd.spells||[]).map(s2=>Object.assign({},s2)),
      learn:cd.learn||{},
      special:cd.special?Object.assign({used:false},cd.special):null,
    });
    const bn=ID2CREW[u.id];
    if(bn&&hpBonus[bn]){ u.maxhp+=hpBonus[bn]; u.hp=u.maxhp; u.base.maxhp=u.maxhp; }
    const wpn=equippedWeapons[u.id];
    if(wpn){ u.atk+=wpn.atk; u.base.atk=u.atk; u.weapon=wpn; }
    applyProgress(u); /* levels/XP/spells carried from past victories (save.js) */
    units.push(u);
  }
  for(const e of mission.enemies){
    units.push(mkUnit(Object.assign({side:'enemy'},e)));
  }
}

/* — movement & pathing — */
function reachSearch(u){
  const best={}, prev={};
  best[bkey(u.x,u.y)]=0;
  const open=[[0,u.x,u.y]];
  while(open.length){
    open.sort((a,b)=>a[0]-b[0]);
    const [c,x,y]=open.shift();
    if(c>best[bkey(x,y)]) continue;
    for(const [dx,dy] of DIRS){
      const nx=x+dx, ny=y+dy;
      if(!inB(nx,ny)) continue;
      const t=TERRAIN[bGrid[ny][nx]];
      if(t.void && !u.fly) continue;
      const o=occ(nx,ny);
      if(o && o.side!==u.side) continue;   /* enemies are walls — body-blocking works */
      const nc=c+(u.fly?1:t.cost);
      if(nc>u.mov) continue;
      const k=bkey(nx,ny);
      if(best[k]===undefined||nc<best[k]){best[k]=nc; prev[k]=bkey(x,y); open.push([nc,nx,ny]);}
    }
  }
  return {best,prev};
}
function reachable(u){
  const {best}=reachSearch(u);
  const set=new Set();
  for(const k in best){
    const x=k%BCOLS, y=(k/BCOLS)|0;
    const o=occ(x,y);
    if(!o||o===u) set.add(Number(k));
  }
  return set;
}
function pathTo(u,tx,ty){
  const {best,prev}=reachSearch(u);
  let k=bkey(tx,ty);
  if(best[k]===undefined) return null;
  const path=[];
  const start=bkey(u.x,u.y);
  while(k!==start){ path.unshift([k%BCOLS,(k/BCOLS)|0]); k=prev[k]; }
  return path;
}
function anyPath(u,tx,ty){
  const prev={}; const start=bkey(u.x,u.y);
  const seen=new Set([start]); const q=[[u.x,u.y]];
  let steps=0;
  while(q.length&&steps++<600){
    const [x,y]=q.shift();
    if(x===tx&&y===ty){
      const path=[]; let k=bkey(x,y);
      while(k!==start){ path.unshift([k%BCOLS,(k/BCOLS)|0]); k=prev[k]; }
      return path;
    }
    for(const [dx,dy] of DIRS){
      const nx=x+dx, ny=y+dy;
      const k=bkey(nx,ny);
      if(seen.has(k)) continue;
      if(!inB(nx,ny)) continue;
      const t=TERRAIN[bGrid[ny][nx]];
      if(t.void&&!u.fly) continue;
      const o=occ(nx,ny);
      if(o&&o.side!==u.side) continue;
      seen.add(k); prev[k]=bkey(x,y); q.push([nx,ny]);
    }
  }
  return null;
}
async function walkUnit(u,tx,ty,msPerTile){
  if(u.x===tx&&u.y===ty) return;
  const path=pathTo(u,tx,ty)||anyPath(u,tx,ty);
  if(!path){ u.x=tx; u.y=ty; u.walk=null; return; }
  const per=fastMode?26:(msPerTile||110);
  for(const [nx,ny] of path){
    const fx=u.x*BT, fy=u.y*BT;
    camFocus(nx*BT+BT/2, ny*BT+BT/2);
    await tween(per, p=>{ u.walk={x:fx+(nx*BT-fx)*p, y:fy+(ny*BT-fy)*p}; });
    u.x=nx; u.y=ny;
  }
  u.walk=null;
}
function targetsInRange(u,rng,side){
  const wantSide = side==='ally' ? u.side : (u.side==='ally'?'enemy':'ally');
  return units.filter(t=>t.alive&&t.side===wantSide)
    .filter(t=>{const d=mdist(u,t); return d>=rng[0]&&d<=rng[1];});
}
function spellTargets(u,s2){
  if(s2.kind==='aura') return aliveOf(u.side).filter(t=>mdist(u,t)<=2&&t.hp<t.maxhp);
  if(s2.kind==='heal'){
    const list=targetsInRange(u,s2.rng,'ally').filter(t=>t.hp<t.maxhp&&t!==u);
    if(s2.rng[0]===0&&u.hp<u.maxhp) list.push(u);
    return list;
  }
  return targetsInRange(u,s2.rng,'enemy');
}

function useBattleItem(n2){
  const it=BATTLE_ITEMS[n2];
  const idx=inventory.indexOf(n2);
  if(!it||idx<0||!it.avail(cur)) return;
  inventory.splice(idx,1);
  bstate='anim'; renderActions();
  it.use(cur);
  renderCard(cur);
  moveSet.clear();
  setTimeout(endTurn, fastMode?120:550);
}

/* — combat math — */
function calcDamage(att,dfn,{ignoreDef=false,bonus=0,mult=1}={}){
  let raw=Math.max(1, att.atk-(ignoreDef?0:effDef(dfn)))+bonus;
  if(att.weapon&&att.weapon.strongVs&&dfn.cls&&dfn.cls.indexOf(att.weapon.strongVs)>=0) raw+=2;
  raw*=(0.9+Math.random()*0.2)*mult;
  let crit=false;
  if(Math.random()<0.08){raw*=1.5; crit=true;}
  return {dmg:Math.max(1,Math.round(raw)), crit};
}
function xpFromDmg(dmg){ return Math.min(10, Math.max(2, Math.round(dmg*0.9))); }
function applyDeath(u,credit){
  u.alive=false; u.bulwark=false;
  log(`${tag(u)} is destroyed!`);
  if(u.side==='ally') casualties++;
  if(credit&&credit.side==='ally') giveXP(credit,10);
  if(u.boss&&!gameOver){
    if(units.filter(t=>t.side==='enemy'&&t.boss&&t.alive).length===0) battleWon();
  }
}
async function killUnit(u,credit){
  const px2=u.x*BT+BT/2, fy=u.y*BT+BT-4;
  const pxs=spritePixels(u.spr,PXS);
  const rw=SPRITES[u.spr][0].length;
  for(const p of pxs){
    if(Math.random()<.55) continue;
    impacts.push({type:'part', x:px2-(rw/2)*PXS+p.x, y:fy-SPRITES[u.spr].length*PXS+p.y, col:p.col,
      vx:(Math.random()-.5)*.18, vy:-.05-Math.random()*.14, t:0});
  }
  applyDeath(u,credit);
  if(!fastMode) await wait(450);
}

let scene=null;

  }

}
function newScene(att,dfn){

async function sceneDeath(u,credit){

async function sceneStrike(att,dfn,opts={},label){
  await sLunge(att,140,170);
  const le=landLE(dfn);
  const missed=!opts.sure && Math.random()<(0.08+le);
  if(missed){
    addPop(dfn,'MISS','#aab4d8');
    log(`${tag(att)} attacks ${tag(dfn)} — <span class="d">evaded!${le>0?' (terrain '+Math.round(le*100)+'%)':''}</span>`);
    await sLunge(dfn,-36,110);
    await sLunge(dfn,0,150);
  } else {
    const {dmg,crit}=calcDamage(att,dfn,opts);
    dfn.hp=Math.max(0,dfn.hp-dmg);
    slashFX(dfn, opts.fxColor||(crit?'#ffd23a':'#f0f4ff'));
    scene.sflash[dfn.id]=12;
    scene.shake=crit?12:8;
    addPop(dfn,(crit?'CRIT ':'')+dmg, crit?'#ffd23a':'#ffffff', crit);
    log(`${tag(att)} ${label||'attacks'} ${tag(dfn)} — <b>${dmg}</b> dmg${crit?' <span class="p">CRITICAL!</span>':''}`);
    if(att.side==='ally') giveXP(att, xpFromDmg(dmg));
    checkBossPhase(dfn);
    renderCard(dfn);
    await wait(400);
  }
  await sLunge(att,0,150);
  if(dfn.hp<=0&&dfn.alive) await sceneDeath(dfn,att);
}
async function strike(att,dfn,opts={},label){
  focusPair(att,dfn);
  await lungeMap(att,dfn.x,dfn.y,150);
  const le=landLE(dfn);
  const missed=!opts.sure && Math.random()<(0.08+le);
  if(missed){
    floatText(dfn.x,dfn.y,'MISS','#aab4d8');
    log(`${tag(att)} attacks ${tag(dfn)} — <span class="d">evaded!</span>`);
  } else {
    const {dmg,crit}=calcDamage(att,dfn,opts);
    dfn.hp=Math.max(0,dfn.hp-dmg);
    dfn.flash=12;

function drawScene(now,dt){
  const g=cx;
  g.save();
  if(scene.shake>0){
    g.translate((Math.random()-.5)*scene.shake,(Math.random()-.5)*scene.shake);
    scene.shake*=.86;
    if(scene.shake<.6) scene.shake=0;
  }
  g.drawImage(sceneBG,0,0);
  for(const u of [scene.enemy, scene.ally]){
    if(scene.hide[u.id]) continue;
    const fx=scX(u);
    g.fillStyle='rgba(0,0,0,.45)';
    g.beginPath(); g.ellipse(fx,SC.groundY+7,44,9,0,0,7); g.fill();
  }
  for(const u of [scene.enemy, scene.ally]){
    if(scene.hide[u.id]) continue;
    const fx=scX(u);
    const hop=((now/360+(u.side==='ally'?0:1))|0)%2?0:-3;
    const flyLift=u.fly? -8-3*Math.sin(now/300) : 0;
    drawSprite(g,u.spr,fx,SC.groundY+flyLift,SC.scale,u.side==='ally',hop);
    if(scene.sflash[u.id]>0){
      scene.sflash[u.id]--;
      if(scene.sflash[u.id]%4<2){
        drawSilhouette(g,u.spr,fx,SC.groundY+flyLift,SC.scale,u.side==='ally',hop,'#ffffff',.85);
      }
    }
  }
  for(const f of scene.fx){
    f.t+=dt;
    if(f.type==='slash'){
      const p=Math.min(1,f.t/240);
      if(p<1){
        g.save();
        g.translate(f.x,f.y);
        g.rotate(-.7);
        g.fillStyle=f.color;
        g.globalAlpha=1-p;
        const len=110*p+30;
        g.fillRect(-len/2, -4, len, 8);
        g.fillRect(-len/3, 8, len*.66, 4);
        g.restore();
        g.globalAlpha=1;
      }
    } else if(f.type==='ring'){
      const p=Math.min(1,f.t/520);
      if(p<1){
        g.strokeStyle=f.color;
        g.globalAlpha=(1-p)*.9;
        g.lineWidth=3.5;
        g.beginPath(); g.arc(f.x,f.y, 12+p*66, 0, 7); g.stroke();
        g.beginPath(); g.arc(f.x,f.y, 5+p*40, 0, 7); g.stroke();
        g.globalAlpha=1; g.lineWidth=1;
      }
    } else if(f.type==='spark'){
      const p=Math.min(1,f.t/700);
      if(p<1){
        g.fillStyle=f.color;
        g.globalAlpha=1-p;
        g.fillRect(f.x, f.y+f.vy*f.t*8, 4,4);
        g.globalAlpha=1;
      }
    }
  }
  scene.fx=scene.fx.filter(f=>f.t<(f.type==='spark'?700:f.type==='ring'?520:240));
  for(const p of scene.parts){
    p.t+=dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=.004*dt;
    g.globalAlpha=Math.max(0,1-p.t/750);
    g.fillStyle=p.col;
    g.fillRect(p.x,p.y,SC.scale-1,SC.scale-1);
  }
  g.globalAlpha=1;
  scene.parts=scene.parts.filter(p=>p.t<750);
  for(const p of scene.pops){
    p.age++;
    const rise=p.age*1.0;
    g.globalAlpha=Math.max(0,1-p.age/60);
    g.font=(p.big?'19px':'14px')+' "Press Start 2P", monospace';
    g.textAlign='center'; g.textBaseline='alphabetic';
    g.fillStyle='#000';
    g.fillText(p.text,p.x+2,p.y-rise+2);
    g.fillStyle=p.color;
    g.fillText(p.text,p.x,p.y-rise);
    g.globalAlpha=1;
  }
  scene.pops=scene.pops.filter(p=>p.age<60);
  drawHPWindow(g, scene.enemy, 10, cv.height-62, 190);
  drawHPWindow(g, scene.ally, cv.width-200, cv.height-62, 190);
  if(scene.banner){
    const t=scene.banner.t;
    const inP=Math.min(1,t/.18);
    const outP=t>.82? (t-.82)/.18 : 0;
    const al=inP*(1-outP);
    g.fillStyle=`rgba(4,5,14,${.72*al})`;
    g.fillRect(0,110,cv.width,86);
    g.fillStyle=`rgba(255,210,58,${.9*al})`;
    g.fillRect(0,110,cv.width,3);
    g.fillRect(0,193,cv.width,3);
    const sc2=.7+ease(inP)*.3;
    g.save();
    g.translate(cv.width/2,153);
    g.scale(sc2,sc2);
    g.globalAlpha=al;
    g.font='15px "Press Start 2P", monospace';
    g.textAlign='center'; g.textBaseline='middle';
    g.fillStyle='#000';
    g.fillText(scene.banner.text,3,3);
    g.fillStyle='#ffd23a';
    g.fillText(scene.banner.text,0,0);
    g.restore();
    g.globalAlpha=1;
  }
  g.restore();
  if(scene.fade>0){
    g.fillStyle=`rgba(3,4,10,${scene.fade})`;
    g.fillRect(0,0,cv.width,cv.height);
  }
}

function useSpecial(){
  const sp2=cur.special;
  if(sp2.type==='riftbreak'){ startTarget('riftbreak'); return; }
  if(sp2.type==='rush'){
    sp2.used=true; kharnRushPending=true;

    log(`<span class="s">✦ ${tag(cur)} howls at the far moons — he will act AGAIN after this turn.</span>`);
    renderCard(cur); renderActions(); return;
  }
  if(sp2.type==='bulwark'){
    sp2.used=true; cur.bulwark=true;
    pushBanner('✦ BULWARK ✦','#b47ae8');
    log(`<span class="s">✦ ${tag(cur)} locks into fortress stance. Nearby enemies can't ignore him.</span>`);
    moveSet.clear(); renderCard(cur);
    endTurn(); return;
  }
  if(sp2.type==='blink'){
    specialSet.clear();
    for(let y=0;y<BROWS;y++)for(let x=0;x<BCOLS;x++){
      const d=Math.abs(x-cur.x)+Math.abs(y-cur.y);
      if(d===0||d>3) continue;
      const t=TERRAIN[bGrid[y][x]];
      if(t.void&&!cur.fly) continue;
      if(occ(x,y)) continue;
      specialSet.add(bkey(x,y));
    }
    bstate='blink'; renderActions(); return;
  }
  if(sp2.type==='swap'){
    specialSet.clear();
    for(const t of aliveOf('ally')) if(t!==cur) specialSet.add(bkey(t.x,t.y));
    bstate='swap'; renderActions(); return;
  }
  if(sp2.type==='cryo'){ bstate='cryo'; renderActions(); return; }
}
